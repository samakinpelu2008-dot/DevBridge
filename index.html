<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevBridge - Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #2563EB;
      --green: #22C55E;
      --dark: #0F172A;
      --gray: #1E293B;
      --light-gray: #334155;
      --white: #F8FAFC;
    }

    * { box-sizing: border-box; margin:0; padding:0; }
    body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--white); }

    a { text-decoration:none; color:inherit; }

    /* NAVBAR */
    nav {
      display:flex; justify-content:space-between; align-items:center;
      padding:20px 50px; background: var(--blue);
    }
    nav .logo { font-weight:700; font-size:28px; letter-spacing:1px; }

    /* CONTAINER */
    .container {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }

    /* USER TYPE SELECTION */
    .user-type {
      display:flex;
      justify-content:center;
      gap:40px;
      margin-bottom:50px;
      flex-wrap: wrap;
    }
    .user-type button {
      padding: 20px 50px;
      font-size: 18px;
      font-weight:700;
      border-radius:8px;
      border:none;
      cursor:pointer;
      transition:0.3s;
      background: var(--gray);
      color: var(--white);
    }
    .user-type button:hover, .user-type button.active {
      background: var(--green);
      color: var(--dark);
    }

    /* FORMS */
    form {
      background: var(--light-gray);
      padding:40px;
      border-radius:12px;
      display:none;
      max-width: 500px;
      margin: 0 auto;
    }

    form.active { display:block; }

    form h2 {
      text-align:center;
      margin-bottom:30px;
      color: var(--green);
    }

    form label {
      display:block;
      margin-bottom:8px;
      font-weight:600;
    }

    form input, form select {
      width:100%;
      padding:12px 15px;
      margin-bottom:20px;
      border-radius:6px;
      border:none;
      background: var(--gray);
      color: var(--white);
      font-size:16px;
    }

    form input::placeholder { color: #CBD5E1; }

    form button {
      width:100%;
      padding:15px;
      background: var(--green);
      color: var(--dark);
      font-size:18px;
      font-weight:700;
      border:none;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
    }

    form button:hover {
      background:#16A34A;
    }

    /* FOOTER */
    footer {
      text-align:center;
      padding:30px 20px;
      margin-top:60px;
      background: var(--blue);
      font-size:14px;
    }

    /* RESPONSIVE */
    @media(max-width:600px){
      .user-type { flex-direction:column; gap:20px; }
    }

  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">DevBridge</div>
  </nav>

  <div class="container">
    <!-- User Type Selection -->
    <div class="user-type">
      <button id="clientBtn" class="active">I am a Client</button>
      <button id="devBtn">I am a Developer</button>
    </div>

    <!-- Client Registration Form -->
    <form id="clientForm" class="active">
      <h2>Client Registration</h2>
      <label for="clientName">Full Name</label>
      <input type="text" id="clientName" placeholder="John Doe">

      <label for="clientEmail">Email</label>
      <input type="email" id="clientEmail" placeholder="example@email.com">

      <label for="clientPassword">Password</label>
      <input type="password" id="clientPassword" placeholder="Enter password">

      <label for="clientCompany">Company / Organization (Optional)</label>
      <input type="text" id="clientCompany" placeholder="Company Name">

      <button type="submit">Create Account</button>
    </form>

    <!-- Developer Registration Form -->
    <form id="devForm">
      <h2>Developer Registration</h2>
      <label for="devName">Full Name</label>
      <input type="text" id="devName" placeholder="Jane Smith">

      <label for="devEmail">Email</label>
      <input type="email" id="devEmail" placeholder="example@email.com">

      <label for="devPassword">Password</label>
      <input type="password" id="devPassword" placeholder="Enter password">

      <label for="devSkills">Skills</label>
      <input type="text" id="devSkills" placeholder="HTML, CSS, React...">

      <label for="devPortfolio">Portfolio Link (Optional)</label>
      <input type="url" id="devPortfolio" placeholder="https://portfolio.com">

      <label for="devLevel">Level</label>
      <select id="devLevel">
        <option>Beginner</option>
        <option>Intermediate</option>
        <option>Elite</option>
      </select>

      <button type="submit">Create Account</button>
    </form>

  </div>

  <footer>
    &copy; 2026 DevBridge. All rights reserved.
  </footer>

  <script>
    const clientBtn = document.getElementById('clientBtn');
    const devBtn = document.getElementById('devBtn');
    const clientForm = document.getElementById('clientForm');
    const devForm = document.getElementById('devForm');

    clientBtn.addEventListener('click', () => {
      clientForm.classList.add('active');
      devForm.classList.remove('active');
      clientBtn.classList.add('active');
      devBtn.classList.remove('active');
    });

    devBtn.addEventListener('click', () => {
      devForm.classList.add('active');
      clientForm.classList.remove('active');
      devBtn.classList.add('active');
      clientBtn.classList.remove('active');
    });
  </script>

</body>
  </html>
